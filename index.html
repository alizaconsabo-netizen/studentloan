<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Loan Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- LOGIN FORM -->
  <div class="container" id="login">
    <div class="logo">
      <img src="" alt="" />
    </div>
    <h2 class="title">Student Loan Management System</h2>

    <form class="form">
      <input type="text" placeholder="ID Number" required />
      <input type="password" placeholder="Password" required />
      <button type="submit" class="btn">Login as Student</button>
      <button type="submit" class="btn outline">Login as Admin</button>
    </form>

    <div class="footer">
      Don’t have an account? <a href="#" id="show-register">Register here</a>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div class="container hidden" id="register">
    <div class="logo">
      <img src="" alt="" />
    </div>
    <h2 class="title">Create Your Student Account</h2>

    <form class="form">
      <div class="name-row">
        <input type="text" placeholder="Last Name" required />
        <input type="text" placeholder="First Name" required />
        <input type="text" placeholder="Middle Name" />
      </div>
      <input type="text" placeholder="Student ID" required />
      <input type="email" placeholder="Email" required />
      <input type="text" placeholder="Course & Year Level" required />
      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />
      <button type="submit" class="btn">Register Account</button>
    </form>

    <div class="footer">
      Already have an account? <a href="#" id="show-login">Login here</a>
    </div>
  </div>

  <script>
    const login = document.getElementById("login");
    const register = document.getElementById("register");
    const showLogin = document.getElementById("show-login");
    const showRegister = document.getElementById("show-register");

    showRegister.addEventListener("click", (e) => {
      e.preventDefault();
      login.classList.add("hidden");
      register.classList.remove("hidden");
    });

    showLogin.addEventListener("click", (e) => {
      e.preventDefault();
      register.classList.add("hidden");
      login.classList.remove("hidden");
    });

  </script>


<% if (typeof message !== 'undefined' && message) { %>
<script>
    alert("<%= message %>");
</script>
<% } %>

</body>
</html>
